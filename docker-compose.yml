services:
  chromadb:
    image: chromadb/chroma:1.5.8
    volumes:
      - ./chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    networks:
      - app-net
    restart: unless-stopped

  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      - chromadb
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge
